workflows:
  ios-app-store:
    name: iOS App Store
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: celio_appstore
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: it.celiopromo.app
      vars:
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
      node: 20.11.0
      xcode: latest
    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: 'v*'
          include: true
    scripts:
      - name: Install npm dependencies
        script: |
          npm ci
      - name: Build web bundle
        script: |
          npm run build
      - name: Capacitor sync iOS
        script: |
          npx cap sync ios
      - name: Ensure Info.plist permissions
        script: |
          PLIST=ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Add :NSCameraUsageDescription string 'Celio utilizza la fotocamera per la prova virtuale degli abiti.'" $PLIST 2>/dev/null || \
            /usr/libexec/PlistBuddy -c "Set :NSCameraUsageDescription 'Celio utilizza la fotocamera per la prova virtuale degli abiti.'" $PLIST
          /usr/libexec/PlistBuddy -c "Add :NSPhotoLibraryUsageDescription string 'Celio accede alle tue foto per provare virtualmente gli abiti.'" $PLIST 2>/dev/null || \
            /usr/libexec/PlistBuddy -c "Set :NSPhotoLibraryUsageDescription 'Celio accede alle tue foto per provare virtualmente gli abiti.'" $PLIST
      - name: Set build number from App Store Connect
        script: |
          LATEST_BUILD_NUMBER=$(app-store-connect get-latest-app-store-build-number "$APP_STORE_APP_ID" 2>/dev/null || echo "0")
          NEW_BUILD_NUMBER=$(($LATEST_BUILD_NUMBER + 1))
          cd ios/App
          agvtool new-version -all $NEW_BUILD_NUMBER
      - name: Initialize keychain and fetch signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "it.celiopromo.app" \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          xcode-project use-profiles
      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.app
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - Internal Testers
        submit_to_app_store: false
