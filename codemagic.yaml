workflows:
  ios-app-store:
    name: iOS App Store
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: CelioPromo
    environment:
      node: 22
      xcode: latest
    scripts:
      - name: Install dependencies and build web
        script: |
          npm ci
          npm run build
          npx cap sync ios
      - name: Ensure Info.plist permissions
        script: |
          PLIST=ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Add :NSCameraUsageDescription string 'Celio utilizza la fotocamera per la prova virtuale degli abiti.'" $PLIST 2>/dev/null || \
            /usr/libexec/PlistBuddy -c "Set :NSCameraUsageDescription 'Celio utilizza la fotocamera per la prova virtuale degli abiti.'" $PLIST
          /usr/libexec/PlistBuddy -c "Add :NSPhotoLibraryUsageDescription string 'Celio accede alle tue foto per provare virtualmente gli abiti.'" $PLIST 2>/dev/null || \
            /usr/libexec/PlistBuddy -c "Set :NSPhotoLibraryUsageDescription 'Celio accede alle tue foto per provare virtualmente gli abiti.'" $PLIST
      - name: Initialize keychain and generate cert private key
        script: |
          keychain initialize
          openssl genrsa -out /tmp/distribution_cert.key 2048
      - name: Fetch or create App Store signing files
        script: |
          app-store-connect fetch-signing-files "it.celiopromo.app" \
            --type IOS_APP_STORE \
            --certificate-key=@file:/tmp/distribution_cert.key \
            --create
      - name: Add certificates to keychain
        script: |
          keychain add-certificates
      - name: Apply profiles to Xcode project
        script: |
          xcode-project use-profiles
      - name: Set build number
        script: |
          cd ios/App
          BUILD_NUMBER=$(date +%s)
          agvtool new-version -all $BUILD_NUMBER
      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --project "ios/App/App.xcodeproj" \
            --scheme "App"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
